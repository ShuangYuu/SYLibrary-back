server:
  port: 8080
  address: 127.0.0.1

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/sylibrary?serverTimezone=GMT%2b8&useUnicode=true&characterEncoding=utf8
    username: sylibrary
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000

logging:
  level:
    root: INFO
    org.springboot: INFO
    org.springframework.jdbc.core: INFO
    org.hibernate.SQL: INFO

book-import:
  open-library:
    proxy:
      enabled: false
      host: 127.0.0.1
      port: 7897
  google-books:
    proxy:
      enabled: false
      host: 127.0.0.1
      port: 7897

app:
  upload:
    avatar-dir: /opt/sylibrary/uploads/avatar/
    public-prefix: /uploads/avatar/
    public-base-url: ${PUBLIC_BASE_URL}
