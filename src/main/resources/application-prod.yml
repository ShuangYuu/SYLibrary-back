server:
  port: 8080
  address: 127.0.0.1

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/sylibrary?serverTimezone=GMT%2b8&useUnicode=true&characterEncoding=utf8
    username: sylibrary
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0

logging:
  level:
    root: INFO
    org.springboot: INFO